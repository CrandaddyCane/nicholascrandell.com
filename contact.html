<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact | Nick Crandell</title>

  <link rel="stylesheet" href="/css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>

  <div id="siteHeader"></div>

  <main class="main">
    <section class="hero contact-page">
      <div class="contact-container">
        <p class="section-eyebrow">Contact</p>
        <h1 class="section-title">Get in touch</h1>

        <p class="section-body">
          Have a project, opportunity, or just want to say hello? Send me a message.
        </p>

        <form id="contactForm" class="contact-form">
          <input type="text" id="name" name="name" placeholder="Your name" required>
          <input type="email" id="email" name="email" placeholder="Your email" required>
          <textarea id="message" name="message" placeholder="Your message" required></textarea>

          <button type="submit" class="btn-primary">Send Message</button>
        </form>

        <p id="status" class="form-status"></p>
      </div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://yrhumnkgemvjmeqqqqzx.supabase.co";
    const SUPABASE_KEY = "sb_publishable_W9wdeWIMB9oK9eJzMRkfzQ_Ccl16KBp";

    const form = document.getElementById("contactForm");
    const status = document.getElementById("status");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      status.textContent = "Sending...";

      const payload = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
      };

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/contact_messages`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Prefer": "return=minimal"
          },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          status.textContent = "Message sent successfully.";
          form.reset();
        } else {
          status.textContent = "Something went wrong.";
        }
      } catch (error) {
        status.textContent = "Unable to send message.";
      }
    });
  </script>

  <script src="/js/header.js"></script>
</body>
</html>
